<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frank-Craft | RPG Village</title>
    <link rel="icon" type="image/png" href="media/favicon.png">
    <link rel="stylesheet" href="media/style.css">
    <link href="https://fonts.bunny.net/css?family=Space+Grotesk:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
      /* --- Logo Animation: Giant & 'Alive' --- */
      .main1_logo {
        width: 900px; 
        max-width: 95vw;
        height: auto;
        transition: transform 0.3s ease;
        animation: breathe 3.1s ease-in-out infinite;
        display: block;
        margin: 0 auto;
        position: relative;
        z-index: 2;
      }

      @keyframes breathe {
        0% {
          transform: scale(1);
          filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.1));
        }
        50% {
          transform: scale(1.04);
          filter: drop-shadow(0 0 35px rgba(255, 255, 255, 0.4));
        }
        100% {
          transform: scale(1);
        }
      }

      .main1_logo:hover {
        animation-play-state: paused; 
        transform: scale(1.08);
      }

      .main1 {
        padding-top: 50px;
        padding-bottom: 50px;
        position: relative; 
        overflow: visible;
      }

      /* --- Stupid-Proof Copier Styles --- */
      .main1_ipcopier_div {
        display: flex;
        justify-content: center;
        margin-top: 25px;
        position: relative;
        z-index: 3;
      }

      .server-instruction-container {
        font-family: 'Space Grotesk', sans-serif;
        text-align: center;
        padding: 20px;
        background-color: #1e1e1e;
        border-radius: 12px;
        width: 100%;
        max-width: 400px;
        color: white;
        box-shadow: 0 4px 10px rgba(0,0,0,0.5);
      }

      .header-instruction-text {
        font-size: 1.1rem;
        margin-bottom: 15px;
        font-weight: bold;
      }

      .copy-button-main {
        background-color: #28a745;
        color: white;
        border: none;
        padding: 15px 20px;
        font-size: 1.05rem;
        font-weight: bold;
        border-radius: 8px;
        cursor: pointer;
        transition: background-color 0.2s, transform 0.1s;
        width: 100%;
        box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      }

      .copy-button-main:hover { background-color: #218838; }
      .copy-button-main:active { transform: translateY(2px); }

      .instruction-text-block {
        margin-top: 15px;
        font-size: 0.95rem;
        line-height: 1.4;
        color: #ccc;
      }

      .highlight { color: #ffcc00; font-weight: bold; }
    </style>
  </head>
  <body>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    
    <nav class="desktop_navbar">
      <a href="#"><img class="desktop_navbar_logo_img" src="media/logo_small.png" alt="logo"></a>
      <a href="https://wiki.frank-craft.com/" class="desktop_navbar_link">Wiki</a>
      <a href="#discord" class="desktop_navbar_link scroll">Community</a>
      <a href="#about" class="desktop_navbar_link scroll">About Us</a>
      <div class="desktop_navbar_link2_div">
          <a href="#join" class="desktop_navbar_link2 scroll">Join Us!</a>
      </div>
    </nav>

    <div class="mainflex">
      <div class="main1">
        <canvas id="particleCanvas" style="position: absolute; top: 0; left: 50%; transform: translateX(-50%); pointer-events: none; z-index: 1;"></canvas>

        <a class="main1_logo_a" href="#">
          <img class="main1_logo" id="logoImg" src="media/logo.png" alt="logo">
        </a>

        <div class="main1_description">
          <a>Discover the Village of</a><br>
          <a class="main1_actcent">Frank-Craft</a><a>.</a>
        </div>
        
        <div class="main1_ipcopier_div">
          <div class="server-instruction-container">
            <div class="header-instruction-text">Ready to play? Follow these 2 steps:</div>
            <button class="copy-button-main" id="copyBtnMain" onclick="copyIPMain()" type="button">
              1. CLICK TO COPY IP: play.frank-craft.com
            </button>
            <div class="instruction-text-block">
              2. Open Minecraft and <span class="highlight">PASTE (Ctrl+V)</span> this address into your Server List.
            </div>
          </div>
        </div>

        <script>
            // --- Copier Function ---
            function copyIPMain() {
              const ip = "play.frank-craft.com";
              const btn = document.getElementById("copyBtnMain");
              navigator.clipboard.writeText(ip).then(() => {
                  const oldTxt = btn.innerHTML;
                  btn.innerHTML = "✅ COPIED!";
                  btn.style.backgroundColor = "#007bff"; 
                  setTimeout(() => {
                    btn.innerHTML = oldTxt;
                    btn.style.backgroundColor = "#28a745"; 
                  }, 2000);
              });
            }

            // --- Particle System ---
            const canvas = document.getElementById('particleCanvas');
            const ctx = canvas.getContext('2d');
            let particles = [];

            function resize() {
                canvas.width = 1400; 
                canvas.height = 900;
            }
            window.addEventListener('resize', resize);
            resize();

            class Particle {
                constructor() {
                    this.x = canvas.width / 2 + (Math.random() - 0.5) * 600;
                    this.y = canvas.height / 2 + (Math.random() - 0.5) * 300;
                    this.size = Math.random() * 5 + 2;
                    this.speedX = (Math.random() - 0.5) * 10;
                    this.speedY = (Math.random() - 0.5) * 10;
                    // Minecraft palette: Dark gray, brown, and a rare gold bit
                    const colors = ['#555', '#8B4513', '#333', '#DAA520'];
                    this.color = colors[Math.floor(Math.random() * colors.length)];
                    this.alpha = 1;
                    this.rotation = Math.random() * 360;
                }
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    this.alpha -= 0.015;
                    this.rotation += 4;
                }
                draw() {
                    ctx.save();
                    ctx.globalAlpha = this.alpha;
                    ctx.fillStyle = this.color;
                    ctx.shadowBlur = 5;
                    ctx.shadowColor = this.color;
                    ctx.translate(this.x, this.y);
                    ctx.rotate(this.rotation * Math.PI / 180);
                    ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
                    ctx.restore();
                }
            }

            function createBurst() {
                for (let i = 0; i < 25; i++) { particles.push(new Particle()); }
            }

            // Sync with 3.1s CSS pulse
            setInterval(createBurst, 3100); 
            setTimeout(() => { setInterval(createBurst, 3100); }, 1550);

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let i = 0; i < particles.length; i++) {
                    particles[i].update();
                    particles[i].draw();
                    if (particles[i].alpha <= 0) { particles.splice(i, 1); i--; }
                }
                requestAnimationFrame(animate);
            }
            animate();
        </script>
      </div>

      <div id="more"></div>
      </div>
  </body>
</html>
